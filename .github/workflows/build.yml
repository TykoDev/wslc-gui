# Builds the Windows executable (x86_64-pc-windows-msvc — Deno's only Windows
# compile target; there is no 32-bit option). The exe is uploaded as a workflow
# artifact on every run, and attached to a GitHub Release when a v* tag is pushed.
name: build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # release upload on tag builds; read-only is enough elsewhere

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Typecheck backend
        run: deno task check

      - name: Unit tests
        run: deno task test

      - name: Build frontend
        run: deno task build:web

      - name: Typecheck frontend
        run: deno task check:web

      - name: Compile Windows executable
        run: deno task compile

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wslc-gui-windows-x86_64
          path: app/dist/wslc-gui.exe
          if-no-files-found: error

      # The two WebView2 DLLs, pinned to the SAME upstream release as the
      # jsr:@webview/webview version in app/deno.json (0.9.0). They must match:
      # main.ts resolves them from a dll\ folder next to the exe, and shipping
      # them there is what makes the first launch fully offline. Without them the
      # app downloads both from GitHub once, on first run.
      - name: Stage WebView2 DLLs
        shell: bash
        run: |
          mkdir -p dist/dll
          curl -fsSL -o dist/dll/webview.dll        https://github.com/webview/webview_deno/releases/download/0.9.0/webview.dll
          curl -fsSL -o dist/dll/WebView2Loader.dll https://github.com/webview/webview_deno/releases/download/0.9.0/WebView2Loader.dll

      # Compress-Archive keeps only the leaf of each path, so the archive is
      # wslc-gui.exe at the root with dll\ beside it — the layout main.ts expects.
      - name: Package offline zip
        shell: pwsh
        run: Compress-Archive -Path dist\wslc-gui.exe, dist\dll -DestinationPath dist\wslc-gui-windows-x86_64-offline.zip -Force

      - name: Upload offline zip
        uses: actions/upload-artifact@v4
        with:
          name: wslc-gui-windows-x86_64-offline
          path: app/dist/wslc-gui-windows-x86_64-offline.zip
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/dist/wslc-gui.exe
